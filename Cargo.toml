[package]
name = "qwen-asr-burn"
version = "0.1.0"
edition = "2021"
default-run = "qwen-asr-burn"

[dependencies]
burn = { version = "0.21", features = ["cuda", "fusion", "std"], default-features = false }
burn-store = "0.21"
clap = { version = "4", features = ["derive"] }
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
hound = "3.5"
rustfft = "6.3"
rubato = "0.16"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
